<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Predict Sensor Data</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="bg-blur blur1"></div>
<div class="bg-blur blur2"></div>

<nav class="navbar">
    <div class="logo">
        ⚡ SensorAI
    </div>

    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/train">Train</a></li>
        <li><a href="/predict">Predict</a></li>
    </ul>
</nav>

<section class="upload-section">

    <div class="glass-card upload-card">

        <h1>Upload Sensor CSV File</h1>

        <p>
            Upload your sensor test dataset and generate predictions instantly.
        </p>

        <form
            id="uploadForm"
            enctype="multipart/form-data"
        >

            <div class="drop-zone" id="dropZone">

                <input
                    type="file"
                    name="file"
                    id="fileInput"
                    accept=".csv"
                    hidden
                >

                <div class="upload-content">

                    <div class="upload-icon">📁</div>

                    <h3>Drag & Drop CSV File</h3>

                    <p>or click to browse</p>

                    <span id="fileName">
                        No file selected
                    </span>

                </div>

            </div>

            <button type="submit" class="primary-btn">
                Predict Now
            </button>

        </form>

        <div class="loader hidden" id="loader"></div>

        <div id="messageBox"></div>

    </div>

</section>

<footer class="footer">
    <p>AI Powered Sensor Fault Prediction System</p>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<script>

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const uploadForm = document.getElementById("uploadForm");
const loader = document.getElementById("loader");
const messageBox = document.getElementById("messageBox");

dropZone.addEventListener("click", () => {
    fileInput.click();
});

fileInput.addEventListener("change", () => {

    if (fileInput.files.length > 0) {

        const file = fileInput.files[0];

        if (!file.name.endsWith(".csv")) {

            messageBox.innerHTML = `
                <div class="error-alert">
                    ❌ Please upload only CSV files
                </div>
            `;

            fileInput.value = "";
            return;
        }

        fileName.innerText = file.name;
    }

});

dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {

    e.preventDefault();

    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;

    if (files.length > 0) {

        const file = files[0];

        if (!file.name.endsWith(".csv")) {

            messageBox.innerHTML = `
                <div class="error-alert">
                    ❌ Only CSV files are allowed
                </div>
            `;

            return;
        }

        fileInput.files = files;

        fileName.innerText = file.name;
    }

});

uploadForm.addEventListener("submit", async (e) => {

    e.preventDefault();

    const file = fileInput.files[0];

    if (!file) {

        messageBox.innerHTML = `
            <div class="error-alert">
                ❌ Please select a CSV file
            </div>
        `;

        return;
    }

    loader.classList.remove("hidden");

    const formData = new FormData();
    formData.append("file", file);

    try {

        const response = await fetch("/predict", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("Prediction failed");
        }

        const blob = await response.blob();

        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");

        a.href = url;

        a.download = "prediction_output.csv";

        document.body.appendChild(a);

        a.click();

        a.remove();

        loader.classList.add("hidden");

        messageBox.innerHTML = `
            <div class="success-alert">
                ✅ Prediction Completed Successfully
            </div>
        `;

    } catch (error) {

        loader.classList.add("hidden");

        messageBox.innerHTML = `
            <div class="error-alert">
                ❌ Error while predicting file
            </div>
        `;
    }

});

</script>

</body>
</html>
